services:
  # Auto-restart Rest-API container
  hose-api:
    restart: unless-stopped

  # Auto-restart DB container
  postgres:
    restart: unless-stopped

  # Expose Rest-API through cloudflared tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://hose-api:8080
    restart: unless-stopped
    depends_on:
      - hose-api
    networks:
      - backend

  # Expose frontend server through cloudflared tunnel
  cloudflared-frontend:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://hose-frontend:80
    restart: unless-stopped
    depends_on:
      - hose-frontend
    networks:
      - backend

  # Run OSRM ARM image
  osrm-foot:
    image: osrm-backend-arm
    restart: unless-stopped
  osrm-bike:
    image: osrm-backend-arm
    restart: unless-stopped
  osrm-car:
    image: osrm-backend-arm
    restart: unless-stopped